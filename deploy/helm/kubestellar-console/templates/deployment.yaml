apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubestellar-console.fullname" . }}
  labels:
    {{- include "kubestellar-console.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubestellar-console.selectorLabels" . | nindent 6 }}
  {{- if .Values.persistence.enabled }}
  strategy:
    type: Recreate
  {{- end }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "kubestellar-console.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kubestellar-console.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if and .Values.backup.enabled .Values.backup.autoRestore }}
      initContainers:
        - name: db-restore
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          command:
            - /bin/sh
            - -c
            - |
              DB_PATH="{{ .Values.database.sqlitePath }}"
              BACKUP_DIR="{{ .Values.backup.directory }}"
              # Schema-only DBs are <=200KB; anything larger has real data
              MIN_DATA_SIZE=200000

              # get_file_size: portable file size using stat (GNU/BSD) or wc -c fallback
              get_file_size() {
                stat -c%s "$1" 2>/dev/null || stat -f%z "$1" 2>/dev/null || wc -c < "$1" 2>/dev/null | tr -d ' ' || echo "0"
              }

              if [ -f "$DB_PATH" ]; then
                DB_SIZE=$(get_file_size "$DB_PATH")
                if [ "$DB_SIZE" -gt "$MIN_DATA_SIZE" ]; then
                  echo "Database exists with data (${DB_SIZE} bytes), skipping restore"
                  exit 0
                fi
                echo "Database exists but appears empty (${DB_SIZE} bytes)"
              else
                echo "No database file found at $DB_PATH"
              fi

              # Find the latest backup
              LATEST=$(ls -1t "$BACKUP_DIR"/console-*.db 2>/dev/null | head -1)
              if [ -z "$LATEST" ]; then
                echo "No backups found in $BACKUP_DIR, starting fresh"
                exit 0
              fi

              BACKUP_SIZE=$(get_file_size "$LATEST")
              if [ "$BACKUP_SIZE" -le "$MIN_DATA_SIZE" ]; then
                echo "Latest backup $LATEST is also empty (${BACKUP_SIZE} bytes), skipping"
                exit 0
              fi

              echo "Restoring from backup: $LATEST (${BACKUP_SIZE} bytes)"
              mkdir -p "$(dirname "$DB_PATH")"
              cp "$LATEST" "$DB_PATH"
              echo "Restore complete"
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: backups
              mountPath: {{ .Values.backup.directory }}
              readOnly: true
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          {{- if .Values.watchdog.enabled }}
          # Startup probe gives the watchdog reverse proxy time to initialize
          # before liveness/readiness probes begin. Without this, the pod may
          # enter CrashLoopBackOff on slow nodes.
          startupProbe:
            httpGet:
              path: /watchdog/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          {{- end }}
          livenessProbe:
            httpGet:
              path: {{ if .Values.watchdog.enabled }}/watchdog/health{{ else }}/healthz{{ end }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ if .Values.watchdog.enabled }}/watchdog/ready{{ else }}/healthz{{ end }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: PORT
              value: "8080"
            {{- if .Values.watchdog.enabled }}
            - name: BACKEND_PORT
              value: "8081"
            {{- end }}
            - name: DATABASE_PATH
              value: {{ .Values.database.sqlitePath | quote }}
            {{- if .Values.route.enabled }}
            - name: FRONTEND_URL
              value: "https://{{ .Values.route.host }}"
            {{- else if .Values.ingress.enabled }}
            - name: FRONTEND_URL
              value: "https://{{ (index .Values.ingress.hosts 0).host }}"
            {{- end }}
            {{- if .Values.github.url }}
            - name: GITHUB_URL
              value: {{ .Values.github.url | quote }}
            {{- end }}
            {{- if .Values.github.existingSecret }}
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.github.existingSecret }}
                  key: {{ .Values.github.existingSecretKeys.clientId }}
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.github.existingSecret }}
                  key: {{ .Values.github.existingSecretKeys.clientSecret }}
            {{- else if and .Values.github.clientId .Values.github.clientSecret }}
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubestellar-console.fullname" . }}
                  key: github-client-id
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubestellar-console.fullname" . }}
                  key: github-client-secret
            {{- end }}
            {{- if or .Values.claude.existingSecret .Values.claude.apiKey }}
            - name: CLAUDE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.claude.existingSecret | default (include "kubestellar-console.fullname" .) }}
                  key: {{ .Values.claude.existingSecretKey | default "claude-api-key" }}
            {{- end }}
            {{- if or .Values.feedbackGithubToken.existingSecret .Values.feedbackGithubToken.token }}
            - name: FEEDBACK_GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.feedbackGithubToken.existingSecret | default (include "kubestellar-console.fullname" .) }}
                  key: {{ .Values.feedbackGithubToken.existingSecretKey | default "feedback-github-token" }}
            {{- end }}
            {{- if or .Values.googleDrive.existingSecret .Values.googleDrive.apiKey }}
            - name: GOOGLE_DRIVE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.googleDrive.existingSecret | default (include "kubestellar-console.fullname" .) }}
                  key: {{ .Values.googleDrive.existingSecretKey | default "google-drive-api-key" }}
            - name: BENCHMARK_FOLDER_ID
              value: {{ .Values.googleDrive.folderId | quote }}
            {{- end }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.jwt.existingSecret | default (include "kubestellar-console.fullname" .) }}
                  key: {{ .Values.jwt.existingSecretKey | default "jwt-secret" }}
            {{- if .Values.enabledDashboards }}
            - name: ENABLED_DASHBOARDS
              value: {{ .Values.enabledDashboards | quote }}
            {{- end }}
            {{- if .Values.consoleProject }}
            - name: CONSOLE_PROJECT
              value: {{ .Values.consoleProject | quote }}
            {{- end }}
            {{- with .Values.branding }}
            {{- if .appName }}
            - name: APP_NAME
              value: {{ .appName | quote }}
            {{- end }}
            {{- if .appShortName }}
            - name: APP_SHORT_NAME
              value: {{ .appShortName | quote }}
            {{- end }}
            {{- if .tagline }}
            - name: APP_TAGLINE
              value: {{ .tagline | quote }}
            {{- end }}
            {{- if .logoUrl }}
            - name: LOGO_URL
              value: {{ .logoUrl | quote }}
            {{- end }}
            {{- if .faviconUrl }}
            - name: FAVICON_URL
              value: {{ .faviconUrl | quote }}
            {{- end }}
            {{- if .themeColor }}
            - name: THEME_COLOR
              value: {{ .themeColor | quote }}
            {{- end }}
            {{- if .docsUrl }}
            - name: DOCS_URL
              value: {{ .docsUrl | quote }}
            {{- end }}
            {{- if .communityUrl }}
            - name: COMMUNITY_URL
              value: {{ .communityUrl | quote }}
            {{- end }}
            {{- if .websiteUrl }}
            - name: WEBSITE_URL
              value: {{ .websiteUrl | quote }}
            {{- end }}
            {{- if .issuesUrl }}
            - name: ISSUES_URL
              value: {{ .issuesUrl | quote }}
            {{- end }}
            {{- if .repoUrl }}
            - name: REPO_URL
              value: {{ .repoUrl | quote }}
            {{- end }}
            {{- if .hostedDomain }}
            - name: HOSTED_DOMAIN
              value: {{ .hostedDomain | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.clusterName }}
            - name: CLUSTER_NAME
              value: {{ .Values.clusterName | quote }}
            {{- end }}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HELM_RELEASE_NAME
              value: {{ .Release.Name | quote }}
            {{- if .Values.selfUpgrade.enabled }}
            - name: SELF_UPGRADE_ENABLED
              value: "true"
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: kc-config
              mountPath: /app/.kc
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /app/data
            {{- end }}
            {{- if and .Values.branding .Values.branding.logoConfigMap }}
            - name: custom-logos
              mountPath: /app/web/dist/custom-logos
              readOnly: true
            {{- end }}
      volumes:
        - name: kc-config
          emptyDir: {}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "kubestellar-console.fullname" . }}
        {{- end }}
        {{- if and .Values.branding .Values.branding.logoConfigMap }}
        - name: custom-logos
          configMap:
            name: {{ .Values.branding.logoConfigMap }}
        {{- end }}
        {{- if and .Values.backup.enabled .Values.backup.autoRestore }}
        - name: backups
          persistentVolumeClaim:
            claimName: {{ include "kubestellar-console.fullname" . }}-backups
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
