name: Nightly UX Journey Tests

# Journey-oriented Playwright tests that exercise every major user
# interaction in demo mode and produce a UX findings report. These tests
# don't gate PRs — they surface UX improvement opportunities.
#
# Uses the real Go backend in dev mode so MSW/demo data is fully active
# and all card interactions (drilldown, expand, search, tour) work exactly
# as they do for real users.
#
# Runs nightly at 05:00 UTC and on manual dispatch.
# Artifacts: HTML report, UX findings markdown, screenshots.

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: nightly-ux-journeys
  cancel-in-progress: true

env:
  CI: true
  NODE_VERSION: "22"

jobs:
  ux-journeys:
    if: github.repository == 'kubestellar/console'
    name: UX Journey Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Build backend
        run: go build -o console-bin ./cmd/console

      - name: Start backend and run UX journey tests
        run: |
          # Start Go backend in dev mode (background, nohup to survive step shell)
          JWT_SECRET="ux-nightly-$(openssl rand -hex 16)" \
          DEV_MODE=true \
          nohup ./console-bin > /tmp/console.log 2>&1 &

          # Wait for backend health
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Backend healthy after ${i}s"
              break
            fi
            sleep 1
          done

          # Run tests from web/ directory
          cd web
          npx playwright test e2e/user-flows/ --project=chromium --reporter=list,html,./e2e/helpers/ux-reporter.ts
        env:
          PLAYWRIGHT_BASE_URL: "http://localhost:8080"

      - name: Upload UX findings report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ux-findings-report
          path: |
            web/test-results/ux-findings-report.md
            web/test-results/ux/
          retention-days: 30

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-ux-report
          path: web/playwright-report/
          retention-days: 14

      - name: Post summary
        if: always()
        run: |
          echo "### UX Journey Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f web/test-results/ux-findings-report.md ]; then
            echo "#### Findings Report" >> "$GITHUB_STEP_SUMMARY"
            head -20 web/test-results/ux-findings-report.md >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "*Full report available in artifacts*" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No UX findings report generated." >> "$GITHUB_STEP_SUMMARY"
          fi

  # Run responsive + a11y tests (also with Go backend for full demo data)
  ux-mobile:
    if: github.repository == 'kubestellar/console'
    name: UX Mobile Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Build backend
        run: go build -o console-bin ./cmd/console

      - name: Start backend and run responsive + a11y tests
        run: |
          JWT_SECRET="ux-mobile-$(openssl rand -hex 16)" \
          DEV_MODE=true \
          nohup ./console-bin > /tmp/console.log 2>&1 &

          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Backend healthy after ${i}s"
              break
            fi
            sleep 1
          done

          cd web
          npx playwright test e2e/user-flows/responsive-layouts.spec.ts e2e/user-flows/a11y-audit.spec.ts --project=chromium --reporter=list,html
        env:
          PLAYWRIGHT_BASE_URL: "http://localhost:8080"

      - name: Upload mobile screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-responsive-screenshots
          path: web/test-results/ux/
          retention-days: 30
