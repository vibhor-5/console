name: Startup Smoke Tests

on:
  schedule:
    # Run at 7 AM UTC daily (after nightly-test-suite at 6 AM)
    - cron: '0 7 * * *'
  push:
    branches: [main]
    paths:
      - 'start.sh'
      - 'start-dev.sh'
      - 'startup-demo.sh'
      - 'startup-oauth.sh'
      - 'entrypoint.sh'
      - 'Dockerfile'
      - 'scripts/startup-smoke-test.sh'
      - '.github/workflows/startup-smoke.yml'
  pull_request:
    branches: [main]
    paths:
      - 'start.sh'
      - 'start-dev.sh'
      - 'startup-demo.sh'
      - 'startup-oauth.sh'
      - 'entrypoint.sh'
      - 'Dockerfile'
      - 'scripts/startup-smoke-test.sh'
      - '.github/workflows/startup-smoke.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: startup-smoke-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26'
  NODE_VERSION: '22'

jobs:
  # Test startup-demo.sh (no OAuth required, fastest to validate)
  smoke-demo:
    name: Smoke — startup-demo.sh
    if: github.repository == 'kubestellar/console'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install npm dependencies
        run: cd web && npm ci

      - name: Run smoke test
        run: bash scripts/startup-smoke-test.sh demo
        timeout-minutes: 5

  # Test startup-oauth.sh with mock credentials
  smoke-oauth:
    name: Smoke — startup-oauth.sh
    if: github.repository == 'kubestellar/console'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install npm dependencies
        run: cd web && npm ci

      - name: Build frontend
        run: cd web && npm run build

      - name: Run smoke test
        run: bash scripts/startup-smoke-test.sh oauth
        timeout-minutes: 10

  # Test Docker build + entrypoint.sh
  smoke-docker:
    name: Smoke — Docker/entrypoint.sh
    if: github.repository == 'kubestellar/console'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Run smoke test
        run: bash scripts/startup-smoke-test.sh docker
        timeout-minutes: 12
