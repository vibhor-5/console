name: Build and Deploy KC

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
      - '!.github/workflows/build-deploy.yml'
      - 'LICENSE'
      - 'OWNERS'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
      - '!.github/workflows/build-deploy.yml'
      - 'LICENSE'
      - 'OWNERS'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deployment target cluster'
        required: false
        default: 'vllm-d'
        type: choice
        options:
          - all
          - vllm-d
          - pok-prod
          - none

# Only one deploy at a time — newer commits cancel in-progress deploys

# Least-privilege: read-only by default; jobs declare write scopes individually
permissions: read-all

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Helm release name used across both clusters
  HELM_RELEASE_NAME: kc

jobs:
  # Build each platform on its NATIVE runner in parallel. Previously this
  # workflow built linux/amd64 + linux/arm64 in a single ubuntu-latest job
  # using QEMU emulation for arm64, which made every PR pay ~35 minutes for
  # the emulated arm64 leg (total ~40 min wall-clock). With native runners
  # the two legs run side-by-side in ~3-5 min each, so PR builds drop to
  # roughly 5-7 min wall-clock total.
  #
  # Each matrix leg pushes its single-arch image to GHCR by digest only
  # (no human-readable tag). The `merge` job then assembles the multi-arch
  # manifest list under the real tags. PR builds skip both the push and
  # the merge — they just verify each platform compiles on its real CPU.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=main-${{ github.sha }}
            COMMIT_HASH=${{ github.sha }}
          # push-by-digest writes the image to GHCR with no tag — only the
          # digest is referenceable until `merge` assembles the manifest.
          # On PRs we drop the push entirely so the build still verifies
          # but does not consume registry storage.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          # Per-architecture cache scope so amd64 and arm64 don't evict
          # each other's layers from a shared scope (which would cause
          # cold rebuilds on every PR).
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.arch }}

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combine the per-architecture digests into a multi-arch manifest list
  # under all the real tags (sha, branch, latest). Skipped on PRs because
  # nothing was pushed in the build matrix above.
  merge:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-vllm-d:
    needs: merge
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: [self-hosted, kc, openshift]
    environment: vllm-d

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up kubectl
        uses: azure/setup-kubectl@15650b3ad78fff148532a140b8a4c821796b2d7b # v5.0.0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Configure kubeconfig from SA token
        run: |
          export KUBECONFIG="$RUNNER_TEMP/kubeconfig"
          SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          CA_CERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          kubectl config set-cluster in-cluster \
            --server=https://kubernetes.default.svc \
            --certificate-authority="$CA_CERT" \
            --embed-certs=true
          kubectl config set-credentials sa-user --token="$SA_TOKEN"
          kubectl config set-context deploy --cluster=in-cluster --user=sa-user
          kubectl config use-context deploy
          echo "KUBECONFIG=$KUBECONFIG" >> "$GITHUB_ENV"

      - name: Verify RBAC permissions
        run: |
          echo "Checking deploy runner SA permissions..."
          if ! kubectl auth can-i create namespaces 2>/dev/null; then
            echo "::error::Runner SA lacks RBAC permissions to create namespaces."
            echo "::error::Apply RBAC: kubectl apply -f deploy/arc/deploy-runner-rbac.yaml"
            echo "::error::Then update RunnerDeployment: kubectl apply -f deploy/arc/kubestellar-console-runner.yaml"
            exit 1
          fi
          if ! kubectl auth can-i create secrets -n kc 2>/dev/null; then
            echo "::error::Runner SA lacks RBAC permissions to create secrets in kc namespace."
            echo "::error::Apply RBAC: kubectl apply -f deploy/arc/deploy-runner-rbac.yaml"
            exit 1
          fi
          echo "RBAC permissions verified."
          kubectl get secrets -n kc --no-headers 2>/dev/null | head -3 || echo "Namespace kc does not exist yet (will be created)"

      - name: Create namespace if not exists
        run: |
          kubectl create namespace kc --dry-run=client -o yaml | kubectl apply -f -

      - name: Create or update secrets
        run: |
          kubectl create secret generic kc-secrets \
            --namespace kc \
            --from-literal=github-client-id=${{ secrets.KSC_OAUTH_CLIENT_ID }} \
            --from-literal=github-client-secret=${{ secrets.KSC_OAUTH_CLIENT_SECRET }} \
            --from-literal=jwt-secret=${{ secrets.KSC_JWT_SECRET }} \
            --from-literal=github-token=${{ secrets.KSC_GITHUB_TOKEN }} \
            --from-literal=google-drive-api-key=${{ secrets.KSC_GOOGLE_DRIVE_API_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Recover stuck Helm release
        run: |
          RELEASE_STATUS=$(helm status ${{ env.HELM_RELEASE_NAME }} -n kc -o json 2>/dev/null | jq -r '.info.status // empty' || true)
          if [[ "$RELEASE_STATUS" == "pending-"* ]]; then
            echo "::warning::Helm release stuck in '$RELEASE_STATUS' — rolling back to recover"
            helm rollback ${{ env.HELM_RELEASE_NAME }} -n kc --wait --timeout 2m || true
          fi

      # #6344 / #6353: OpenShift SCC allocates a namespace-specific UID
      # range and rejects pods whose runAsUser falls outside that range.
      # The chart default (runAsUser=1001) is correct for Kind/Minikube
      # but breaks OpenShift with a silent "Replicas: 0/1" timeout. The
      # --set overrides below unset runAsUser/runAsGroup so the SCC
      # admission controller can inject its own values. IMPORTANT:
      # runAsNonRoot stays `true` (chart default) so PodSecurity
      # "restricted" still accepts the pod — only the UID/GID numbers
      # need to be null.
      - name: Deploy with Helm
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE_NAME }} ./deploy/helm/kubestellar-console \
            --namespace kc \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }} \
            --set github.url=https://github.ibm.com \
            --set github.existingSecret=kc-secrets \
            --set jwt.existingSecret=kc-secrets \
            --set githubToken.existingSecret=kc-secrets \
            --set googleDrive.existingSecret=kc-secrets \
            --set route.enabled=true \
            --set route.host=kc.apps.fmaas-vllm-d.fmaas.res.ibm.com \
            --set clusterName=vllm-d \
            --set-string enabledDashboards="dashboard\,clusters\,gpu-reservations\,llm-d-benchmarks\,ai-ml\,arcade" \
            --set persistence.storageClass=ocs-storagecluster-cephfs \
            --set rbac.namespaceCreationEnabled=true \
            --set securityContext.runAsUser=null \
            --set securityContext.runAsGroup=null \
            --atomic \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/kc-kubestellar-console -n kc --timeout=3m
          echo "Deployment successful!"
          echo "Access KC at: https://kc.apps.fmaas-vllm-d.fmaas.res.ibm.com"

  deploy-pok-prod:
    needs: merge
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: [self-hosted, kc-pok]
    environment: pok-prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up kubectl
        uses: azure/setup-kubectl@15650b3ad78fff148532a140b8a4c821796b2d7b # v5.0.0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Configure kubeconfig from SA token
        run: |
          export KUBECONFIG="$RUNNER_TEMP/kubeconfig"
          SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          CA_CERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          kubectl config set-cluster in-cluster \
            --server=https://kubernetes.default.svc \
            --certificate-authority="$CA_CERT" \
            --embed-certs=true
          kubectl config set-credentials sa-user --token="$SA_TOKEN"
          kubectl config set-context deploy --cluster=in-cluster --user=sa-user
          kubectl config use-context deploy
          echo "KUBECONFIG=$KUBECONFIG" >> "$GITHUB_ENV"
          echo "Verifying cluster access..."
          kubectl get secrets -n kubestellar-console --no-headers | head -3

      - name: Create namespace if not exists
        run: |
          kubectl create namespace kubestellar-console --dry-run=client -o yaml | kubectl apply -f -

      - name: Create or update secrets
        run: |
          kubectl create secret generic kc-kubestellar-console \
            --namespace kubestellar-console \
            --from-literal=github-client-id=${{ secrets.KSC_OAUTH_CLIENT_ID }} \
            --from-literal=github-client-secret=${{ secrets.KSC_OAUTH_CLIENT_SECRET }} \
            --from-literal=jwt-secret=${{ secrets.KSC_JWT_SECRET }} \
            --from-literal=github-token=${{ secrets.KSC_GITHUB_TOKEN }} \
            --from-literal=google-drive-api-key=${{ secrets.KSC_GOOGLE_DRIVE_API_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Recover stuck Helm release
        run: |
          RELEASE_STATUS=$(helm status ${{ env.HELM_RELEASE_NAME }} -n kubestellar-console -o json 2>/dev/null | jq -r '.info.status // empty' || true)
          if [[ "$RELEASE_STATUS" == "pending-"* ]]; then
            echo "::warning::Helm release stuck in '$RELEASE_STATUS' — rolling back to recover"
            helm rollback ${{ env.HELM_RELEASE_NAME }} -n kubestellar-console --wait --timeout 2m || true
          fi

      # #6344 / #6353: OpenShift SCC — see comment on the vllm-d Deploy
      # with Helm step above. Same fix: unset runAsUser/runAsGroup so the
      # SCC admission controller can assign a namespace-appropriate UID.
      # runAsNonRoot stays true so PodSecurity "restricted" still accepts
      # the pod.
      - name: Deploy with Helm
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE_NAME }} ./deploy/helm/kubestellar-console \
            --namespace kubestellar-console \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }} \
            --set github.url=https://github.ibm.com \
            --set github.existingSecret=kc-kubestellar-console \
            --set jwt.existingSecret=kc-kubestellar-console \
            --set githubToken.existingSecret=kc-kubestellar-console \
            --set googleDrive.existingSecret=kc-kubestellar-console \
            --set route.enabled=true \
            --set route.host=kc-kubestellar-console-kubestellar-console.apps.pokprod001.ete14.res.ibm.com \
            --set clusterName=pok-prod-001 \
            --set-string enabledDashboards="dashboard\,clusters\,gpu-reservations\,llm-d-benchmarks\,ai-ml\,arcade" \
            --set rbac.namespaceCreationEnabled=true \
            --set securityContext.runAsUser=null \
            --set securityContext.runAsGroup=null \
            --atomic \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/kc-kubestellar-console -n kubestellar-console --timeout=3m
          echo "Deployment successful!"
          echo "Access KC at: https://kc-kubestellar-console-kubestellar-console.apps.pokprod001.ete14.res.ibm.com"
