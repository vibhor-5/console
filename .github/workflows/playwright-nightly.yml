name: Playwright Cross-Browser (Nightly)

on:
  schedule:
    - cron: '30 6 * * *'  # 6:30 AM UTC daily
  workflow_dispatch: {}

concurrency:
  group: playwright-nightly-${{ github.run_id }}
  cancel-in-progress: false

env:
  CI: true

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-build-output
          path: web/dist
          retention-days: 1

  # Cross-browser tests — catches browser-specific regressions in Firefox & WebKit
  # Related issues: #2982 (invisible at certain widths), #2999 (browser widths), #3035 (overlap)
  cross-browser:
    name: Cross-Browser (${{ matrix.browser }})
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [firefox, webkit]
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: nightly-build-output
          path: web/dist

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Start preview server
        run: |
          npm run preview &
          npx wait-on http://localhost:4173 --timeout 60000

      - name: Run Playwright tests (${{ matrix.browser }})
        run: npx playwright test --project=${{ matrix.browser }} --retries=0 --timeout=30000
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.browser }}-report
          path: web/playwright-report/
          retention-days: 7
