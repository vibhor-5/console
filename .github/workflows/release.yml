name: Release

on:
  schedule:
    # Nightly at 5 AM UTC (midnight Eastern during EST, 1 AM during EDT)
    - cron: '0 5 * * *'
    # Weekly on Sunday at 5 AM UTC
    - cron: '0 5 * * 0'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'nightly'
        type: choice
        options:
          - nightly
          - weekly
          - patch
          - minor
          - major
      dry_run:
        description: 'Dry run (no actual release)'
        required: false
        default: false
        type: boolean

# Least-privilege: read-only by default; jobs declare write scopes individually
permissions: read-all

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  helm-test:
    uses: ./.github/workflows/helm-test.yml

  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_name: ${{ steps.version.outputs.release_name }}
      release_type: ${{ steps.type.outputs.release_type }}
      is_prerelease: ${{ steps.type.outputs.is_prerelease }}
      has_changes: ${{ steps.changes.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Determine release type
        id: type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TYPE="${{ github.event.inputs.release_type }}"
          elif [ "${{ github.event.schedule }}" = "0 5 * * 0" ]; then
            RELEASE_TYPE="weekly"
          else
            RELEASE_TYPE="nightly"
          fi

          echo "release_type=$RELEASE_TYPE" >> $GITHUB_OUTPUT

          # Only nightly builds are pre-releases; weekly builds are stable releases
          if [ "$RELEASE_TYPE" = "nightly" ]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

          echo "Release type: $RELEASE_TYPE"

      - name: Get latest tag
        id: latest_tag
        run: |
          # Get latest version tag (including pre-releases for change detection)
          LATEST_TAG=$(git tag -l 'v*' | sort -V | tail -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

          # Get latest stable version tag (for version calculation)
          LATEST_STABLE=$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1)
          if [ -z "$LATEST_STABLE" ]; then
            LATEST_STABLE="v0.0.0"
          fi
          echo "latest_stable=$LATEST_STABLE" >> $GITHUB_OUTPUT
          echo "Latest stable tag: $LATEST_STABLE"

      - name: Check for changes since last release
        id: changes
        run: |
          LATEST_TAG="${{ steps.latest_tag.outputs.latest_tag }}"

          # Check for any changes since last tag
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            echo "No previous tag - including everything"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check for any changes at all
          TOTAL_CHANGES=$(git rev-list "$LATEST_TAG"..HEAD --count)
          if [ "$TOTAL_CHANGES" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Total commits since last release: $TOTAL_CHANGES"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes since last release"
          fi

      - name: Calculate new version
        id: version
        run: |
          LATEST="${{ steps.latest_tag.outputs.latest_stable }}"
          RELEASE_TYPE="${{ steps.type.outputs.release_type }}"
          DATE=$(date +%Y%m%d)

          # Remove 'v' prefix
          VERSION=${LATEST#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          case $RELEASE_TYPE in
            nightly)
              NEW_VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))-nightly.${DATE}"
              RELEASE_NAME="$NEW_VERSION"
              ;;
            weekly)
              # Weekly produces stable version but with -weekly suffix in release name
              NEW_VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))"
              RELEASE_NAME="${NEW_VERSION}-weekly"
              ;;
            patch)
              NEW_VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))"
              RELEASE_NAME="$NEW_VERSION"
              ;;
            minor)
              NEW_VERSION="v${MAJOR}.$((MINOR + 1)).0"
              RELEASE_NAME="$NEW_VERSION"
              ;;
            major)
              NEW_VERSION="v$((MAJOR + 1)).0.0"
              RELEASE_NAME="$NEW_VERSION"
              ;;
          esac

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION (release name: $RELEASE_NAME)"

  test:
    runs-on: ubuntu-latest
    needs: determine-version
    if: needs.determine-version.outputs.has_changes == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Run Go tests
        run: go test -v ./...

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Lint frontend
        working-directory: web
        run: npm run lint || true

  release:
    needs: [determine-version, test]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: ${{ github.event.inputs.dry_run != 'true' && needs.determine-version.outputs.has_changes == 'true' }}
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tag
        run: |
          VERSION="${{ needs.determine-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if tag exists
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists, force updating..."
            git tag -d "$VERSION"
            git push origin ":refs/tags/$VERSION" || true
          fi

          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # v7.1.0
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          RELEASE_NAME: ${{ needs.determine-version.outputs.release_name }}

      - name: Attest GoReleaser binary artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign release artifacts with cosign
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.determine-version.outputs.version }}
        run: |
          # Sign checksums file with keyless cosign (Sigstore OIDC).
          # Use --bundle (new cosign v3 default) since the legacy
          # --output-signature / --output-certificate flags are ignored
          # when the new bundle format is active, causing:
          #   "create bundle file: open : no such file or directory"
          # The OpenSSF Scorecard Signed-Releases check accepts .bundle
          # files as valid signing evidence.
          cosign sign-blob --yes \
            --bundle dist/checksums.txt.bundle \
            dist/checksums.txt

          # Upload signing bundle to the release
          gh release upload "${VERSION}" \
            dist/checksums.txt.bundle \
            --repo "${{ github.repository }}" \
            --clobber

  # Build Docker images per-platform in parallel to avoid QEMU cross-compilation
  # timeout. Each platform builds natively-emulated in its own job, then the
  # manifest job merges them into a single multi-arch manifest list.
  docker-build:
    needs: [determine-version, release]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: needs.release.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare platform pair
        id: prep
        run: |
          platform=${{ matrix.platform }}
          echo "pair=${platform//\//-}" >> "$GITHUB_OUTPUT"

      - name: Build and push per-platform image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        continue-on-error: true
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            APP_VERSION=${{ needs.determine-version.outputs.version }}
            COMMIT_HASH=${{ github.sha }}
          cache-from: type=gha,scope=docker-${{ steps.prep.outputs.pair }}
          cache-to: type=gha,scope=docker-${{ steps.prep.outputs.pair }},mode=max
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Wait before retry
        if: steps.build.outcome == 'failure'
        run: |
          echo "::warning::Build failed for ${{ matrix.platform }}, retrying in 30s..."
          sleep 30

      - name: Build and push per-platform image (retry)
        id: build-retry
        if: steps.build.outcome == 'failure'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            APP_VERSION=${{ needs.determine-version.outputs.version }}
            COMMIT_HASH=${{ github.sha }}
          cache-from: type=gha,scope=docker-${{ steps.prep.outputs.pair }}
          cache-to: type=gha,scope=docker-${{ steps.prep.outputs.pair }},mode=max
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /home/runner/digests
          digest="${{ steps.build-retry.outputs.digest || steps.build.outputs.digest }}"
          touch "/home/runner/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: digests-${{ steps.prep.outputs.pair }}
          path: /home/runner/digests/*
          if-no-files-found: error
          retention-days: 1

  # Merge per-platform images into a single multi-arch manifest list
  docker-manifest:
    needs: [determine-version, docker-build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: /home/runner/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        id: manifest
        working-directory: /home/runner/digests
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          VERSION="${{ needs.determine-version.outputs.version }}"
          RELEASE_TYPE="${{ needs.determine-version.outputs.release_type }}"

          # Build the list of per-platform image references
          SOURCES=()
          for dgst in *; do
            SOURCES+=("${IMAGE}@sha256:${dgst}")
          done

          # Create and push the manifest list with all tags
          docker buildx imagetools create \
            --tag "${IMAGE}:${VERSION}" \
            --tag "${IMAGE}:${RELEASE_TYPE}" \
            --tag "${IMAGE}:latest" \
            "${SOURCES[@]}"

          # Capture the manifest list digest for attestation
          DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" --format '{{.Manifest.Digest}}')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Attest container image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

  helm-release:
    needs: [determine-version, release, docker-manifest, helm-test]
    runs-on: ubuntu-latest
    if: needs.release.result == 'success'
    permissions:
      contents: write
      pages: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Update Chart.yaml version
        run: |
          FULL_VERSION="${{ needs.determine-version.outputs.version }}"
          CHART_VERSION="${FULL_VERSION#v}"
          sed -i "s/^version:.*/version: $CHART_VERSION/" deploy/helm/kubestellar-console/Chart.yaml
          # appVersion keeps "v" prefix to match Docker image tags (v0.3.9, etc.)
          sed -i "s/^appVersion:.*/appVersion: \"$FULL_VERSION\"/" deploy/helm/kubestellar-console/Chart.yaml
          cat deploy/helm/kubestellar-console/Chart.yaml

      - name: Package Helm chart
        run: |
          mkdir -p .helm-releases
          helm package deploy/helm/kubestellar-console -d .helm-releases

      - name: Publish to gh-pages
        run: |
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

          # Clone or create gh-pages branch
          if git ls-remote --exit-code --heads "$REPO_URL" gh-pages >/dev/null 2>&1; then
            git clone --branch gh-pages --single-branch "$REPO_URL" gh-pages
          else
            mkdir -p gh-pages
            cd gh-pages
            git init
            git checkout -b gh-pages
            git remote add origin "$REPO_URL"
            cd ..
          fi

          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Copy chart package, Artifact Hub metadata, and build index
          cp ../.helm-releases/*.tgz .
          cp ../deploy/helm/kubestellar-console/artifacthub-repo.yml .
          helm repo index . --url https://kubestellar.github.io/console
          git add .
          git commit -m "Release Helm chart ${{ needs.determine-version.outputs.version }}" || echo "No changes"
          git push origin gh-pages --force

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push chart to OCI registry
        run: |
          # Push to ghcr.io/kubestellar/charts so users can:
          #   helm pull oci://ghcr.io/kubestellar/charts/kubestellar-console
          helm push .helm-releases/*.tgz oci://ghcr.io/kubestellar/charts

  notify:
    needs: [determine-version, test, release, helm-release]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      issues: write
      contents: read
    steps:
      - name: Release summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ needs.determine-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Type**: ${{ needs.determine-version.outputs.release_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Pre-release**: ${{ needs.determine-version.outputs.is_prerelease }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Has changes**: ${{ needs.determine-version.outputs.has_changes }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.determine-version.outputs.has_changes }}" != "true" ]; then
            echo "### Skipped" >> $GITHUB_STEP_SUMMARY
            echo "No changes since last release. Release was skipped." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.release.result }}" = "success" ]; then
            echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
            echo "- GitHub Release: https://github.com/${{ github.repository }}/releases/tag/${{ needs.determine-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
            echo "- Docker Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.determine-version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- Binaries: kc-agent + console for linux/darwin (amd64/arm64)" >> $GITHUB_STEP_SUMMARY
            echo "- Homebrew: \`brew upgrade kc-agent\`" >> $GITHUB_STEP_SUMMARY
            echo "- Helm Chart (repo): \`helm repo add kubestellar-console https://kubestellar.github.io/console && helm install kc kubestellar-console/kubestellar-console\`" >> $GITHUB_STEP_SUMMARY
            echo "- Helm Chart (OCI): \`helm install kc oci://ghcr.io/kubestellar/charts/kubestellar-console\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Status: ${{ needs.release.result }}" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Open issue on release failure
        if: needs.test.result == 'failure' || needs.release.result == 'failure' || needs.helm-release.result == 'failure'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const version = '${{ needs.determine-version.outputs.version }}';
            const releaseType = '${{ needs.determine-version.outputs.release_type }}';
            const testResult = '${{ needs.test.result }}';
            const releaseResult = '${{ needs.release.result }}';
            const helmResult = '${{ needs.helm-release.result }}';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const failedJobs = [];
            if (testResult === 'failure') failedJobs.push('test');
            if (releaseResult === 'failure') failedJobs.push('release');
            if (helmResult === 'failure') failedJobs.push('helm-release');

            // Hours after closure that still counts as the "same incident" —
            // if the last release-failure issue closed within this window and
            // tonight still failed, the fix didn't stick. Reopen it instead
            // of cutting a fresh issue every night.
            const SAME_INCIDENT_HOURS = 48;

            const failureSummary = [
              `## Release Failure — \`${version}\``,
              ``,
              `The **${releaseType}** release failed.`,
              ``,
              `**Failed jobs:** ${failedJobs.join(', ')}`,
              `- test: ${testResult}`,
              `- release: ${releaseResult}`,
              `- helm-release: ${helmResult}`,
              ``,
              `**Workflow run:** ${runUrl}`,
            ].join('\n');

            // Look for the most recent release-failure issue (any state).
            // Rolling incident model: open issue → comment; recently-closed
            // issue → reopen + comment; otherwise → new issue.
            const { data: recent } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'release-failure',
              state: 'all',
              sort: 'created',
              direction: 'desc',
              per_page: 1,
            });
            const existing = recent[0];

            const now = Date.now();
            const closedAt = existing?.closed_at ? new Date(existing.closed_at).getTime() : 0;
            const hoursSinceClose = closedAt ? (now - closedAt) / 36e5 : Infinity;
            const isOpen = existing && existing.state === 'open';
            const recentlyClosed = existing && existing.state === 'closed' && hoursSinceClose <= SAME_INCIDENT_HOURS;

            if (isOpen || recentlyClosed) {
              if (recentlyClosed) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  state: 'open',
                });
              }
              const note = recentlyClosed
                ? `🔁 **Reopened:** previous fix did not stick — tonight's release also failed.`
                : `🔁 **Still failing:** another release failure recorded.`;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `${note}\n\n${failureSummary}`,
              });
              core.info(`Updated existing issue #${existing.number} (${recentlyClosed ? 'reopened' : 'commented'}).`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 ${releaseType} release failing`,
                body: `${failureSummary}\n\n_Auto-created by the release workflow. Subsequent nightly failures within ${SAME_INCIDENT_HOURS}h will append to this issue instead of opening a duplicate._`,
                labels: ['bug', 'release-failure'],
              });
              core.info(`Created new issue #${created.number}.`);
            }
